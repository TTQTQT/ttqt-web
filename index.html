<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRUNG TÂM QUAN TRẮC</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: white;
    }
  </style>
</head>

<body>

<div id="loading">Đang tải hệ thống...</div>

<iframe id="frame"></iframe>

<script>

const API =
  "https://script.google.com/macros/s/AKfycbylXTkucAE98WtxMSfaG-ydkdoDi_J4U-T0mfhj-CM8Mo30n7DurVuLr3ZNYEGLDjZH3w/exec";

fetch(API)
  .then(res => res.json())
  .then(data => {

    if (!data.url) {
      document.getElementById("loading").innerText =
        "Không có WebApp active";
      return;
    }

    const frame = document.getElementById("frame");

    frame.onload = () => {
      document.getElementById("loading").style.display = "none";
    };

    frame.src = data.url;
  })
  .catch(err => {
    document.getElementById("loading").innerText =
      "Lỗi tải hệ thống";
  });

</script>

</body>
</html>
