<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRUNG TÂM QUAN TRẮC</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      font-size: 18px;
      background: #ffffff;
      z-index: 1000;
    }

    /* iframe full screen */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* top bar (optional) */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: #1e1e1e;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-family: Arial;
      font-size: 14px;
      z-index: 999;
    }
  </style>
</head>

<body>

<div id="loading">Đang tải hệ thống quan trắc...</div>


<iframe
  id="frame"
  src="https://script.google.com/macros/s/AKfycbylXTkucAE98WtxMSfaG-ydkdoDi_J4U-T0mfhj-CM8Mo30n7DurVuLr3ZNYEGLDjZH3w/exec">
</iframe>

<script>
  const frame = document.getElementById("frame");
  const loading = document.getElementById("loading");

  // Khi iframe load xong
  frame.onload = function () {
    loading.style.display = "none";
  };

  // fallback nếu load lâu
  setTimeout(() => {
    loading.style.display = "none";
  }, 15000);

  // Nếu lỗi (một số browser không trigger đầy đủ)
  frame.onerror = function () {
    loading.innerText = "Không thể tải hệ thống";
  };
</script>

</body>
</html>
